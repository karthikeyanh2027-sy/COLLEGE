<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Page</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .login-box{
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background: darkblue;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form>
            <input type="text" placeholder="Enter Username" required>

            <input type="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
